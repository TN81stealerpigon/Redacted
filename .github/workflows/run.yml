name: Nuke All Workflow Runs

on:
  workflow_dispatch:  # Trigger manually from the Actions tab

permissions:
  actions: write       # Required to delete runs

jobs:
  nuke-all-runs:
    runs-on: ubuntu-latest
    steps:
      - name: Delete ALL completed workflow runs (including dead/stuck ones)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          echo "Fetching all completed workflow run IDs..."
          run_ids=$(gh api --paginate \
            -H "Accept: application/vnd.github+json" \
            "/repos/$REPO/actions/runs" \
            --jq '.workflow_runs[] | select(.status == "completed" or .status == "failure" or .status == "cancelled") | .id')

          count=0
          total=$(echo "$run_ids" | wc -l)

          if [ -z "$run_ids" ]; then
            echo "No completed/failed/cancelled runs found."
            exit 0
          fi

          echo "Found $total runs to delete."

          for id in $run_ids; do
            echo "Deleting run $id ($((++count))/$total)..."
            gh api \
              -X DELETE \
              -H "Accept: application/vnd.github+json" \
              "/repos/$REPO/actions/runs/$id" || echo "Failed to delete $id (might already be gone)"
            sleep 0.4   # Gentle rate-limit avoidance (~150 req/min)
          done

          echo "Deletion attempt finished."
