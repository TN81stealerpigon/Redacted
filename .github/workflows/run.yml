name: BitRot 24/7
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
  push:
    branches: [ main ]
concurrency:
  group: bot-single-instance
  cancel-in-progress: true
jobs:
  run-bitrot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install discord.py groq
      - name: Write bot file
        run: echo "${{ secrets.BOT_CODE }}" > bitrot_syndicate_bot.py
      - name: Run BitRot
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          MAIN_API_KEY: ${{ secrets.MAIN_API_KEY }}
          SUMM_API_KEY: ${{ secrets.SUMM_API_KEY }}
        run: |
          python bitrot_syndicate_bot.py &
          BOT_PID=$!
          sleep 5
          if ! kill -0 $BOT_PID 2>/dev/null; then
            echo "Bot failed to start"
            exit 1
          fi
          trap "kill $BOT_PID 2>/dev/null; wait $BOT_PID 2>/dev/null" EXIT
          wait $BOT_PID
