- name: Install dependencies
  run: pip install --no-cache-dir discord.py cryptography groq

- name: Write bot file
  env:
    BOT_CODE: ${{ secrets.BOT_CODE }}
  run: printf '%s\n' "$BOT_CODE" > bitrot_syndicate_bot.py

- name: Run BitRot
  env:
    DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
    MAIN_API_KEY: ${{ secrets.MAIN_API_KEY }}
    SUMM_API_KEY: ${{ secrets.SUMM_API_KEY }}
  run: |
    python bitrot_syndicate_bot.py &
    BOT_PID=$!
    sleep 8
    if ! kill -0 $BOT_PID 2>/dev/null; then
      echo "Bot failed to start or crashed"
      exit 1
    fi
    trap 'kill -TERM $BOT_PID 2>/dev/null; sleep 3; kill -KILL $BOT_PID 2>/dev/null || true; wait $BOT_PID' TERM INT
    wait $BOT_PID
