name: BitRot Killer (Process Nuke)

on:
  workflow_dispatch:  # only manual trigger, so you control when to nuke

concurrency:
  group: bot-single-instance
  cancel-in-progress: true

jobs:
  nuke-old:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "This run exists only to cancel/kill any previous run in the same concurrency group."
          echo "GitHub will automatically terminate the old runner's processes (including any lingering bots)."
          sleep 10  # optional: give extra time for old run to receive cancel signal
          echo "Done. Old instances should now be dead."
