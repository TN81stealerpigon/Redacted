name: BitRot 24/7

on:
  schedule:
    - cron: "*/5 * * * *"          # Every 5 min → quick restart after 6h GitHub kill
  workflow_dispatch:
  push:
    branches: [ main ]

concurrency:
  group: bot-single-instance
  cancel-in-progress: true

jobs:
  run-bitrot:
    runs-on: ubuntu-latest
    timeout-minutes: 360           # Explicit max (hard limit anyway)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install --no-cache-dir discord.py cryptography groq

      - name: Write bot file
        env:
          BOT_CODE: ${{ secrets.BOT_CODE }}
        run: printf '%s\n' "$BOT_CODE" > bitrot_syndicate_bot.py

      - name: Run BitRot (up to 6 hours max)
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          MAIN_API_KEY: ${{ secrets.MAIN_API_KEY }}
          SUMM_API_KEY: ${{ secrets.SUMM_API_KEY }}
        run: |
          [ -z "$DISCORD_TOKEN" ] && { echo "DISCORD_TOKEN missing"; exit 1; }

          python bitrot_syndicate_bot.py &
          BOT_PID=$!

          sleep 12

          kill -0 $BOT_PID 2>/dev/null || { echo "Bot failed to start"; exit 1; }

          echo "Bot running — will continue until GitHub kills job at ~6 hours"

          trap '
            echo "Cancel or timeout → killing bot"
            kill -TERM $BOT_PID 2>/dev/null || true
            sleep 5
            kill -KILL $BOT_PID 2>/dev/null || true
            wait $BOT_PID 2>/dev/null || true
            exit 0
          ' TERM INT

          wait $BOT_PID   # Wait forever (or until GitHub timeout kills the job)

      - name: Save state
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          [ -f conversation_state.json ] || exit 0

          git add conversation_state.json
          git commit -m "Auto-save $(date -u +'%Y-%m-%d %H:%M:%S UTC')" || echo "No changes"
          git push origin HEAD:main || echo "Push failed"
