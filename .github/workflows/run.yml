name: BitRot Runtime

on:
  schedule:
    - cron: "*/5 * * * *"  # Runs every 5 minutes
  workflow_dispatch:  # Manual trigger
  push:
    branches: [ main ]

jobs:
  run-bitrot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          pip install discord.py requests beautifulsoup4 python-nmap PyJWT cloudscraper
      
      - name: Run BitRot
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        run: python BitRot_syndicate_bot.py
