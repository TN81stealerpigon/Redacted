name: BitRot Cleanup - Kill Lingering Runs

on:
  workflow_dispatch:

concurrency:
  group: bot-single-instance
  cancel-in-progress: true

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Purpose
        run: |
          echo "This is a cleanup workflow."
          echo "Triggering it cancels any still-running/queued runs in the group."
          echo "Dead/failed runs stay until manually deleted via UI or API."
          sleep 10
          echo "Done."
