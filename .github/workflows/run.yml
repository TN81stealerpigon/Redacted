name: Cleanup - Delete Old Workflow Runs

on:
  workflow_dispatch:  # Lets you run it manually from Actions tab

permissions:
  actions: write      # Required to delete runs

jobs:
  delete-old-runs:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 1             # Delete runs older than 1 day (change to 0 or 7 if needed)
          keep_minimum_runs: 0       # Delete everything possible (0 = keep none)
          delete_only_cancelled: false  # false = delete all (success/fail/cancel)
