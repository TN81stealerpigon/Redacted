name: Nuke - Delete As Many Runs As Possible

on:
  workflow_dispatch:

permissions:
  actions: write

jobs:
  aggressive-delete:
    runs-on: ubuntu-latest
    steps:
      - name: Delete runs older than 0 days (max aggressive)
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 0
          use_daily_retention: false
          delete_workflow_by_state_pattern: ALL
          delete_run_by_conclusion_pattern: ALL
          dry_run: false

      - name: Delete orphan / deleted-workflow runs (extra pass)
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 0
          delete_workflow_pattern: .*
          delete_run_by_conclusion_pattern: .*
