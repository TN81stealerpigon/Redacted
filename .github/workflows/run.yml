name: BitRot Runtime

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  run-bitrot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          pip install discord.py groq  # Add any other packages
      
      - name: Run BitRot
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          MAIN_API_KEY: ${{ secrets.MAIN_API_KEY }}
          SUMM_API_KEY: ${{ secrets.SUMM_API_KEY }}
        run: python BitRot_syndicate_bot.py
